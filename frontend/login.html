<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Utilities — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .login-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .login-divider {
      height: 1px;
      background: #2d3148;
      margin: 28px 0;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      color: #3c4043;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, box-shadow .15s;
    }
    .btn-google:hover {
      background: #f8f8f8;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .btn-google:active { background: #f0f0f0; }

    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .login-note {
      margin-top: 20px;
      font-size: 12px;
      color: #64748b;
    }

    .error-banner {
      display: none;
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 20px;
      text-align: left;
    }
    .error-banner.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">&#x1F4CC;</div>
    <div class="login-title">PIN Utilities</div>

    <div class="login-divider"></div>

    <div class="error-banner" id="error-banner"></div>

    <a class="btn-google" href="/auth/login">
      <!-- Google G logo SVG -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <p class="login-note">Chỉ dành cho nội bộ PIN</p>
  </div>

  <script>
    // Hiện error banner nếu có query param ?error=...
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    if (err) {
      const banner = document.getElementById('error-banner');
      const messages = {
        oauth_failed: 'Đăng nhập thất bại. Vui lòng thử lại.',
        access_denied: 'Bạn đã từ chối quyền truy cập.',
      };
      banner.textContent = messages[err] || `Lỗi: ${err}`;
      banner.classList.add('show');
    }
  </script>
</body>
</html>
